services:
  gpu-monitor:
    build: .
    container_name: gpu-monitor
    pid: "host"
    environment:
      - MONITOR_APP=nvtop
      - DASHBOARD_PORT=8080
      - TTYD_INTERNAL_PORT=7681
      - DASHBOARD_CONFIG=/etc/gpu-monitor/config.yaml
      - LLAMA_DIR=${LLAMA_DIR:-/mnt/nvmestorage/compose/llama.cpp}
      - STACKS_DIR=${STACKS_DIR:-/mnt/nvmestorage/compose/llama.cpp/stacks}
      - MODELS_DIR=${MODELS_DIR:-/mnt/nvmestorage/compose/llama.cpp/models}
      - LLAMA_WORKING_DIR_LABEL=${LLAMA_WORKING_DIR_LABEL:-/mnt/nvmestorage/compose/llama.cpp}
    stdin_open: true
    tty: true
    ports:
      - "9358:80"
      - "9359:7681"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/nvmestorage/compose/llama.cpp:/mnt/nvmestorage/compose/llama.cpp:ro
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.580.126.09:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.580.126.09:ro
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
    restart: always
