# Runtime configuration for dashboard-server.py
# Environment variables with the same meaning always override these values.

# Root directory containing switch-llm.sh and the stacks directory.
llama_dir: /opt/llama.cpp

# Directory containing docker compose stack files with # LLM_META headers.
# If omitted, defaults to <llama_dir>/stacks.
stacks_dir: /opt/llama.cpp/stacks

# Directory containing model files used by stack examples/docs.
models_dir: /opt/llama.cpp/models

# Expected Docker Compose working_dir label used to identify managed containers.
llama_working_dir_label: /opt/llama.cpp

# Optional absolute path to switch script.
# If omitted, defaults to <llama_dir>/switch-llm.sh.
# switch_script: /opt/llama.cpp/switch-llm.sh
